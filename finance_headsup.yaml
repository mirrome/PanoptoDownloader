# Financial Management HeadsUp Videos - Panopto Downloader Config
# =====================================================
#
# HOW TO USE:
# Run: panopto-downloader -c finance_headsup.yaml download
#
# These are supplementary HeadsUp videos for Financial Management

browser: chrome
cookies_file: cookies_mitsloan.txt

# Where to save videos
download_path: ~/Videos/MIT_Lectures/Financial_Management/HeadsUp

# Output naming: Title_Date.mp4
naming:
  format: "{title}"
  date_format: "%Y-%m-%d"
  create_lecture_folders: false

# Download 4 videos at a time
download:
  parallel_workers: 4
  download_all_streams: true  # Download composed, camera, and slides for each video

# Skip already downloaded files
resume:
  check_existing: true

# Retry failed downloads 3 times
retry:
  enabled: true
  max_attempts: 3

