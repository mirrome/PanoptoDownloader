# Introduction to Disciplined Entrepreneurship Course - Panopto Downloader Config
# =====================================================
#
# HOW TO USE:
# 1. Open each lecture in Chrome and copy the URL
# 2. Paste the URL in the 'url' field below
# 3. Run: panopto-downloader -c disciplined_entrepreneurship.yaml download
#
# TIP: Close Chrome before running for reliable cookie access

browser: chrome

# Where to save videos
download_path: ~/Videos/MIT_Lectures/Disciplined_Entrepreneurship

# Output naming: Course_Title_Date.mp4
naming:
  format: "{course}_{title}_{date}"
  date_format: "%Y-%m-%d"
  create_lecture_folders: true  # Creates a folder per lecture named after the title

# Download 4 videos at a time (change to 1 for sequential, or adjust as needed)
download:
  parallel_workers: 4
  download_all_streams: true  # Download composed, camera, and slides for each lecture

# Skip already downloaded files
resume:
  check_existing: true

# Retry failed downloads 3 times
retry:
  enabled: true
  max_attempts: 3

