# MIT EECS Panopto Courses
# Uses the --profile eecs auth profile (mit.hosted.panopto.com)
#
# Usage:
#   panopto-downloader --profile eecs batch -c eecs_courses.yaml --all-streams --dry-run
#   panopto-downloader --profile eecs batch -c eecs_courses.yaml --all-streams

output_path: "/Volumes/NAS/MIT EMBA/MIT_Lectures"

courses:
